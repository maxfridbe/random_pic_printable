<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famous Paintings 0.7x1.0 Print Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page {
                size: letter;
                margin: 0;
            }
            body {
                background: white !important;
                -webkit-print-color-adjust: exact;
                margin: 0;
            }
            .no-print {
                display: none !important;
            }
        }

        .print-container {
            width: 8.5in;
            height: 11in;
            padding: 1in;
            box-sizing: border-box;
            display: grid;
            /* 0.7" images + 1" gaps = 4 columns across */
            grid-template-columns: repeat(4, 0.7in);
            /* 1.0" images + 1" gaps = 5 rows down */
            grid-auto-rows: 1in;
            column-gap: 1in;
            row-gap: 1in;
            margin: 0 auto;
            background: white;
            justify-content: center;
            align-content: start;
        }

        .painting-thumb {
            width: 0.7in;
            height: 1in;
            object-fit: cover;
            display: block;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .painting-thumb:hover {
            transform: scale(1.05);
            border-color: #3b82f6;
        }

        /* Locked state styling */
        .painting-thumb.locked {
            border: 3px solid #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        @media print {
            .painting-thumb {
                transform: none !important;
                border: 1px solid #eee !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    
    <div class="no-print p-4 bg-blue-50 border-b border-blue-200 text-center flex flex-col items-center gap-2">
        <p class="text-sm text-blue-800">
            <strong>Dimensions:</strong> 0.7" x 1.0" images with 1" spacing.
            <br>Click an image to <strong>Lock</strong> it, then <strong>Randomize</strong> the rest.
        </p>
        <div class="flex gap-2">
            <button id="randomize-btn" class="bg-gray-600 text-white px-4 py-2 rounded shadow hover:bg-gray-700 transition">
                Randomize
            </button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">
                Print Sheet
            </button>
        </div>
    </div>

    <div class="print-container" id="gallery"></div>

    <script>
        const gallery = document.getElementById('gallery');
        const randomizeBtn = document.getElementById('randomize-btn');
        const totalSlots = 20;
        
        // Initialize slots
        for (let i = 0; i < totalSlots; i++) {
            const img = document.createElement('img');
            img.className = 'painting-thumb';
            img.dataset.index = i;
            img.onclick = () => img.classList.toggle('locked');
            
            img.onerror = function() {
                const fallbackId = Math.floor(Math.random() * 1000) + 1;
                this.src = `https://picsum.photos/id/${fallbackId}/200/300`;
            };
            
            gallery.appendChild(img);
        }

        function randomize() {
            const imgs = document.querySelectorAll('.painting-thumb');
            
            // To avoid duplicates, we'll keep track of currently used IDs
            const usedIds = new Set();
            imgs.forEach(img => {
                if (img.classList.contains('locked') && img.dataset.id) {
                    usedIds.add(img.dataset.id);
                }
            });

            imgs.forEach(img => {
                if (!img.classList.contains('locked')) {
                    let newId;
                    do {
                        newId = Math.floor(Math.random() * 1000) + 1;
                    } while (usedIds.has(newId.toString()));
                    
                    usedIds.add(newId.toString());
                    img.dataset.id = newId;
                    img.src = `https://picsum.photos/id/${newId}/200/300?t=${Date.now()}`;
                }
            });
        }

        randomizeBtn.onclick = randomize;

        // Initial load
        randomize();
    </script>
</body>
</html>
